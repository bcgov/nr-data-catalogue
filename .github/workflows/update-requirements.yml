name: Update requirements.txt from Pipfile.lock

on:
  push:
    paths:
      - 'scripts/openmetadata-tagging-project/Pipfile.lock'

jobs:
  update-requirements:
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: scripts/openmetadata-tagging-project

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pipenv
        run: pip install pipenv

      - name: Export requirements.txt from Pipfile.lock
        run: pipenv requirements --exclude-markers > requirements.txt

      - name: Commit changes (if any)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add requirements.txt
          git commit -m "chore: sync requirements.txt from Pipfile.lock" || exit 0
          git push
